<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decode File — Jh Godown</title>
  <meta name="description" content="Decode Jh Godown encoded text back to original files.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
</head>
<body id="decode-page">
  <!-- Header -->
  <header class="jh-header">
    <a href="index.html" class="jh-header-logo">JH GODOWN</a>
    <div class="jh-header-actions">
      <button class="jh-theme-toggle" onclick="ThemeManager.toggle()" title="Toggle theme">
        <i data-lucide="sun-moon"></i>
      </button>
      <a href="login.html" class="jh-btn jh-btn-primary jh-btn-sm" data-auth-login><i data-lucide="log-in"></i> Login</a>
      <button class="jh-btn-icon" onclick="Auth.logout()" data-auth-logout style="display:none"><i data-lucide="log-out"></i></button>
    </div>
  </header>

  <!-- Sidebar -->
  <nav class="jh-sidebar">
    <a href="index.html" class="jh-sidebar-link"><i data-lucide="home"></i> Home</a>
    <a href="encode.html" class="jh-sidebar-link"><i data-lucide="upload-cloud"></i> Encode</a>
    <a href="decode.html" class="jh-sidebar-link active"><i data-lucide="download-cloud"></i> Decode</a>
    <a href="profile.html" class="jh-sidebar-link"><i data-lucide="user"></i> Profile</a>
  </nav>

  <!-- Main -->
  <main class="jh-page jh-main-with-sidebar">
    <div class="jh-container">
      <h1 style="margin-bottom:4px"><i data-lucide="download-cloud"></i> Decode File</h1>
      <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:20px">Restore original files from encoded text</p>

      <!-- Decode by Post ID -->
      <div class="jh-card">
        <h3 style="margin-bottom:12px"><i data-lucide="cloud-download"></i> Decode from Cloud</h3>
        <div style="display:flex;gap:10px">
          <input type="text" id="decode-post-id" class="jh-input" placeholder="Enter Post ID (e.g. im00001)" style="flex:1;text-transform:uppercase">
          <button class="jh-btn jh-btn-primary" id="btn-fetch">
            <i data-lucide="search"></i> Fetch
          </button>
        </div>
        <p style="font-size:0.75rem;color:var(--text-muted);margin-top:8px">
          Enter the Post ID shared with you to download the original file.
        </p>
      </div>

      <!-- Decode Pasted Text -->
      <div class="jh-card" style="margin-top:16px">
        <h3 style="margin-bottom:12px"><i data-lucide="file-text"></i> Decode from Text</h3>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:10px">
          Paste encoded text directly (works offline):
        </p>
        <textarea id="decode-input" class="jh-textarea" placeholder="Paste the encoded text here..." rows="6" style="font-size:0.75rem;font-family:monospace"></textarea>
        <button class="jh-btn jh-btn-success jh-btn-lg" id="btn-decode-text" style="width:100%;margin-top:12px">
          <i data-lucide="play"></i> Decode Text
        </button>
      </div>

      <!-- Progress -->
      <div id="decode-progress"></div>

      <!-- Result -->
      <div id="decode-result" class="jh-hidden">
        <div class="jh-card">
          <h3 style="margin-bottom:12px"><i data-lucide="check-circle"></i> Decoded Successfully</h3>
          <div id="decode-stats"></div>
          <div id="decode-preview" style="margin:16px 0"></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="jh-btn jh-btn-primary jh-btn-lg jh-disabled" id="btn-download" style="flex:1;min-width:140px">
              <i data-lucide="download"></i> Download File
            </button>
            <button class="jh-btn jh-btn-secondary" id="btn-copy-text">
              <i data-lucide="copy"></i> Copy Text
            </button>
            <button class="jh-btn jh-btn-secondary" onclick="Share.share({title:'Decoded file from Jh Godown'})">
              <i data-lucide="share-2"></i> Share
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav class="jh-bottom-nav">
    <a href="index.html" class="jh-nav-item"><i data-lucide="home"></i><span>Home</span></a>
    <a href="encode.html" class="jh-nav-item"><i data-lucide="upload-cloud"></i><span>Encode</span></a>
    <a href="decode.html" class="jh-nav-item active"><i data-lucide="download-cloud"></i><span>Decode</span></a>
    <a href="profile.html" class="jh-nav-item"><i data-lucide="user"></i><span>Profile</span></a>
  </nav>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/api.js"></script>
  <script src="js/notify.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/image.js"></script>
  <script src="js/share.js"></script>
  <script src="js/decode.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      Auth.updateUI();
    });
  </script>
</body>
</html>
